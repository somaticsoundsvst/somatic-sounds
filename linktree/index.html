  <style>
    :root {
      --bg: #ece5d8;
      --sand: #ded4c4;
      --sand-dark: #c9bda9;
      --white: #fbf9f4;
      --bark: #4a3f33;
      --stone: #8a7d6b;
      --stone-dark: #685c4c;
      --radius-md: 14px;
      --radius-lg: 22px;
      --font-serif: 'Fraunces', Georgia, serif;
      --font-sans: 'Nunito Sans', system-ui, sans-serif;
      --transition: 0.25s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--bark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1.25rem 2.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .hub {
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: rise 0.7s ease both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* emblem */
    .emblem {
      width: 88px;
      height: 88px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      overflow: hidden;
      background: var(--sand);
      border: 1px solid var(--sand-dark);
    }
    .emblem img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .wordmark {
      font-family: var(--font-serif);
      font-size: 1.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--bark);
      line-height: 1.1;
    }
    .tagline {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--stone-dark);
      margin-top: 0.4rem;
    }
    .location {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--stone);
      margin-top: 0.6rem;
    }

    /* waveform divider, a nod to the card */
    .wave {
      width: 180px;
      height: 26px;
      margin: 1.4rem auto 1.8rem;
      opacity: 0.55;
    }
    .wave line { stroke: var(--stone); stroke-width: 2; stroke-linecap: round; }

    .links { display: flex; flex-direction: column; gap: 0.85rem; }

    .link {
      display: block;
      padding: 1rem 1.25rem;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .link:hover { transform: translateY(-2px); }

    .link-primary {
      background: var(--bark);
      color: var(--white);
      box-shadow: 0 6px 20px rgba(58, 46, 34, 0.18);
    }
    .link-primary:hover { box-shadow: 0 10px 26px rgba(58, 46, 34, 0.26); }

    .link-outline {
      background: var(--white);
      color: var(--bark);
      border: 1px solid var(--sand-dark);
    }
    .link-outline:hover { box-shadow: 0 6px 18px rgba(58, 46, 34, 0.1); }

    .socials {
      display: flex;
      justify-content: center;
      gap: 1.4rem;
      margin-top: 2.2rem;
    }
    .socials a {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--stone-dark);
      text-decoration: none;
      transition: color var(--transition);
    }
    .socials a:hover { color: var(--bark); }

    .foot {
      margin-top: 2.4rem;
      font-size: 0.74rem;
      letter-spacing: 0.05em;
      color: var(--stone);
    }
    .foot a { color: var(--stone-dark); text-decoration: none; }
    .foot a:hover { color: var(--bark); }
  </style>
</head>
